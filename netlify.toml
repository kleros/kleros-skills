[[edge_functions]]
  function = "markdown-negotiation"
  path = "/"

[[edge_functions]]
  function = "markdown-negotiation"
  path = "/index.html"

[[headers]]
  for = "/"
  [headers.values]
    Link = '''</SKILL.md>; rel="describedby", </.well-known/api-catalog>; rel="api-catalog"'''

[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = '''application/linkset+json; profile="https://www.rfc-editor.org/info/rfc9727"'''

[[redirects]]
from = "/llms.txt"
to = "/SKILL.md"
status = 200
force = true

[[redirects]]
from = "/:skill"
to = "/:skill/SKILL.md"
status = 200
force = false
