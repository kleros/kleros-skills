[[edge_functions]]
  function = "markdown-negotiation"
  path = "/"

[[edge_functions]]
  function = "markdown-negotiation"
  path = "/index.html"

[[headers]]
  for = "/"
  [headers.values]
    Link = '''</SKILL.md>; rel="describedby"'''

[[redirects]]
from = "/llms.txt"
to = "/SKILL.md"
status = 200
force = true

[[redirects]]
from = "/:skill"
to = "/:skill/SKILL.md"
status = 200
force = false
